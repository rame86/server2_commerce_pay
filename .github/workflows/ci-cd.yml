name: Payment Service CI/CD

on:
  push:
    branches: [ master ] # 브랜치를 master로 변경

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 1. Payment 서비스 빌드 (Gradle)
      - name: Build Payment Service
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      # 2. DockerHub 로그인
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. 이미지 빌드 및 푸시 (msa-payment)
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/msa-payment:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/msa-payment:latest

      # 4. GCP Server 2 배포
      - name: Deploy to GCP Server 2
        uses: appleboy/ssh-action@master
        with:
          host: 34.50.60.193
          username: oksm1003
          key: ${{ secrets.GCP_KEY }} # Shop과 동일한 키 이름으로 통일
          script: |
            # 1. payment 폴더로 이동 (폴더 없으면 미리 만들어둬!)
            cd /home/oksm1003/payment 
            
            # 2. 코드 업데이트 (master 브랜치 기준)
            git pull origin master
            
            # 3. .env 파일 자동 생성 (Secrets 이름 일치 확인)
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" > .env
            echo "DB_USER=${{ secrets.POSTGRES_USER }}" >> .env
            echo "DB_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            echo "RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}" >> .env
            echo "RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}" >> .env
            echo "TZ=Asia/Seoul" >> .env
            
            # 4. 컨테이너 갱신 및 실행
            docker compose pull
            docker compose up -d
            docker image prune -f