name: Payment Service CI/CD

on:
  push:
    branches: [ master ] # master 브랜치에 푸시되거나 머지될 때만 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 1. JAR 파일 빌드 (Gradle 사용)
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar

      # 2. Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Docker 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/msa-payment:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/msa-payment:latest

      # 4. GCP Server 2 배포
      - name: Deploy to GCP Server 2
        uses: appleboy/ssh-action@master
        with:
          host: 34.50.60.193
          username: oksm1003
          key: ${{ secrets.GCP_KEY }}
          script: |
            # payment 폴더로 이동 (없으면 에러 방지용 체크 필요할 수 있음)
            cd /home/oksm1003/payment 
            
            # 서버 브랜치를 master로 전환하고 최신 코드 가져오기
            git fetch origin
            git checkout master || git checkout -b master
            git pull origin master
            
            # .env 파일 생성 (환경 변수 설정)
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" > .env
            echo "DB_USER=${{ secrets.POSTGRES_USER }}" >> .env
            echo "DB_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            echo "RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}" >> .env
            echo "RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}" >> .env
            echo "TZ=Asia/Seoul" >> .env
            
            # 컨테이너 갱신 및 실행
            docker compose pull
            docker compose up -d
            
            # 사용하지 않는 오래된 이미지 삭제 (용량 확보)
            docker image prune -f