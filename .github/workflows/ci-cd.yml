name: Payment Service CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # GCP Server 2 배포
      - name: Deploy to GCP Server 2
        uses: appleboy/ssh-action@master
        with:
          host: 34.50.60.193
          username: oksm1003
          key: ${{ secrets.GCP_SSH_S2_KEY }}
          script: |
            # 1. payment 폴더로 이동 및 코드 업데이트
            cd /home/oksm1003/payment 
            git pull origin main
            
            # 2. .env 파일 자동 생성 [cite: 2026-02-11]
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" > .env
            echo "DB_USER=${{ secrets.DB_USER }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}" >> .env
            echo "RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}" >> .env
            echo "TZ=Asia/Seoul" >> .env
            
            # 3. 컨테이너 갱신 및 실행
            docker compose pull
            docker compose up -d
            docker image prune -f