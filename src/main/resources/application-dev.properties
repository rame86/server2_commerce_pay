# src/main/resources/application-dev.properties

# PostgreSQL 설정
# 환경 변수가 없으면 localhost 기준으로 동작하도록 기본값 설정
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://34.158.208.117:5432/msa_pay_db?currentSchema=pay}
spring.datasource.username=${POSTGRES_USER:app_user}
spring.datasource.password=${POSTGRES_PASSWORD:user1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# RabbitMQ 설정
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=msa_mq
spring.rabbitmq.password=mq1234

# JPA 및 Hibernate 설정
# DDL 스크립트를 별도로 관리하므로 테이블 자동 생성 대신 검증(validate)만 수행
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# MyBatis Mapper XML 위치 설정
mybatis.mapper-locations=classpath:mappers/**/*.xml
# DTO 패키지 경로 별칭 설정 (XML에서 패키지명 생략 가능)
mybatis.type-aliases-package=com.example.payment.dto.response