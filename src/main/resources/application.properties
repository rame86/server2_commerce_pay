spring.application.name=payment

# [Server Settings]
server.port=8081
# 2서버는 경로를 /api/payment 로 잡는 게 관리하기 편해요!
server.servlet.context-path=/api/payment

# [Database Settings]
# 2서버 전용 DB 정보 (1서버랑 같은 DB를 쓰더라도 주소는 적어줘야 해요)
spring.datasource.url=jdbc:postgresql://34.158.208.117:5432/msa_core_db
spring.datasource.username=app_user
spring.datasource.password=user1234

# [MyBatis Settings]
mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=com.example.payment.dto
mybatis.configuration.map-underscore-to-camel-case=true

# [JWT Secret Key]
jwt.secret=your-very-very-secret-key-should-be-very-long-and-secure

# [Redis Settings] - ★★★ 1서버가 쓰는 그 Redis를 바라봐야 함! ★★★
spring.data.redis.host=localhost
spring.data.redis.port=6379

# [JPA Settings]
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# [RabbitMQ Settings]
spring.rabbitmq.host=34.158.208.117
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}